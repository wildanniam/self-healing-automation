name: Playwright Tests & Self-Healing
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    - name: Configure git identity
      if: github.event_name == 'push'
      run: |
        git config user.email "self-healing-bot@github.com"
        git config user.name "Self-Healing Bot"
    - name: Run post-heal (patch + commit + PR)
      if: github.event_name == 'push'
      run: npm run post-heal
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Upload Healing Results & Metrics
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: healing-results
        path: healing-results/
        retention-days: 30
